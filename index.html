<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEVS | Ianua Bellatorum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; margin: 0; overflow: hidden; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .overlay { background: linear-gradient(to bottom, rgba(3, 7, 18, 0.4) 0%, rgba(3, 7, 18, 0.9) 80%, rgba(3, 7, 18, 1) 100%); }
        .fade-in { animation: fadeIn 1.2s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        .bg-animate { animation: slowZoom 20s ease-in-out infinite alternate; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center">

    <div class="absolute inset-0 z-0 overflow-hidden bg-black">
        <img id="bg-image" src="" alt="Background" class="w-full h-full object-cover grayscale opacity-40 transition-opacity duration-[1500ms] bg-animate">
        <div class="absolute inset-0 overlay"></div>
    </div>

    <main class="relative z-10 w-full max-w-md px-6 flex flex-col items-center text-center fade-in">
        <div class="mb-8 flex flex-col items-center">
            <div class="text-[9px] text-amber-500/50 uppercase tracking-[0.4em] mb-1.5 font-cinzel">· I M P E R I V M ·</div>
            <h1 class="text-5xl font-black font-cinzel bg-gradient-to-b from-yellow-100 via-amber-400 to-amber-600 bg-clip-text text-transparent tracking-[0.35em] uppercase mr-[-0.35em]">DEVS</h1>
            <p class="text-[10px] text-stone-400 uppercase tracking-[0.3em] mt-3 font-medium">Ianua Bellatorum</p>
        </div>

        <div class="mb-10 min-h-[120px] flex items-center justify-center">
            <h2 id="latin-phrase" class="text-xl sm:text-2xl font-bold uppercase text-orange-200 font-cinzel tracking-[0.2em] transition-opacity duration-[1500ms] leading-relaxed"></h2>
        </div>

        <div class="w-full bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800 shadow-2xl">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 text-left">Inserisci Signvm (Parola Chiave)</label>
            <input type="text" id="keyword" placeholder="ES. SIGNVM" class="w-full bg-gray-950/50 border border-gray-700 text-white px-4 py-4 rounded-xl focus:outline-none focus:border-orange-500 transition-all uppercase font-medium">
            <p id="error-msg" class="text-red-500 text-xs mt-3 hidden text-left font-bold uppercase tracking-tighter">Signvm non trovato nel Tabularium.</p>
            <button onclick="accediScheda()" class="mt-5 w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-wider text-sm transition-all transform active:scale-95">Accedi alla Scheda</button>
            <p id="db-status" class="text-[8px] text-gray-600 mt-4 uppercase tracking-[0.2em]"></p>
        </div>
    </main>

    <script>
        // Inserisci qui il link RAW del tuo file database.json su GitHub
        const JSON_URL = "https://raw.githubusercontent.com/TUO-UTENTE/TUO-REPO/main/database.json";

        let databaseSchede = null;

        const immaginiSfondo = [
            "mm_1.png", 
            "mm_2.png", 
            "mm_3.png"
        ];

        const frasiLatino = [
            "Gloriam putate quod<br>Deus ipse vos<br>ad bellum exercet",
            "Benedictus Deus<br>qui docet manus meas<br>ad proelium",
            "A la pugna<br>Iddio t'addestra",
            "Deus te<br>ad pugnam vocat",
            "Dio lo vole,<br>la spada lo compie", 
            "Bellator sum,<br>Deo duce",
            "Che l'ira d'Iddio<br>guidi lo tuo ferro", 
            "Ira deorum,<br>gladius meus",
            "Forte lo braccio,<br>saldo lo core", 
            "In cruce<br>et ferro<br>spes nostra",
            "Nihil time,<br>Deus tecum est",
            "Chi teme la morte<br>non vince la pugna", 
            "Si vis pacem,<br>para bellum",
            "Sotto l'usbergo<br>batte cor di lione", 
            "Virtus in<br>belli igne<br>probatur",
            "Lame di ferro,<br>animi di foco", 
            "Aut viam inveniam,<br>aut faciam",
            "Ne la bufera<br>s'erge lo guerriero", 
            "Mors in acie<br>gloria est",
            "Corde de ferro,<br>animo sine metu",
            "Pugna<br>usque ad finem",
            "Armati omai,<br>ch'è l'ora suprema", 
            "In pace leones,<br>in proelio dracones",
            "Vincit qui<br>se vincit",
            "Fortuna audaces<br>iuvat",
            "Per aspera<br>ad astra"
        ];

        async function caricaDati() {
            try {
                const resp = await fetch(JSON_URL + "?t=" + new Date().getTime());
                if (resp.ok) {
                    databaseSchede = await resp.json();
                }
            } catch (e) {
                console.error("Errore caricamento database.");
            }
        }

        let currentImgIndex = 0;
        let currentPhraseIndex = 0;

        document.addEventListener("DOMContentLoaded", () => {
            caricaDati(); // Avvia il recupero dei dati dal file JSON
            
            const bgImageEl = document.getElementById('bg-image');
            const phraseEl = document.getElementById('latin-phrase');

            currentImgIndex = Math.floor(Math.random() * immaginiSfondo.length);
            currentPhraseIndex = Math.floor(Math.random() * frasiLatino.length);

            bgImageEl.src = immaginiSfondo[currentImgIndex];
            phraseEl.innerHTML = frasiLatino[currentPhraseIndex];

            setInterval(() => {
                phraseEl.classList.remove('opacity-100');
                phraseEl.classList.add('opacity-0');
                setTimeout(() => {
                    currentPhraseIndex = (currentPhraseIndex + 1) % frasiLatino.length;
                    phraseEl.innerHTML = frasiLatino[currentPhraseIndex];
                    phraseEl.classList.remove('opacity-0');
                    phraseEl.classList.add('opacity-100');
                }, 1500); 
            }, 6000);

            setInterval(() => {
                bgImageEl.classList.remove('opacity-40');
                bgImageEl.classList.add('opacity-0');
                setTimeout(() => {
                    currentImgIndex = (currentImgIndex + 1) % immaginiSfondo.length;
                    bgImageEl.src = immaginiSfondo[currentImgIndex];
                    bgImageEl.classList.remove('opacity-0');
                    bgImageEl.classList.add('opacity-40');
                }, 1500); 
            }, 10000);

            document.getElementById("keyword").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    accediScheda();
                }
            });
        });

        function accediScheda() {
            if (!databaseSchede) return; // Attende che il fetch sia completato

            const input = document.getElementById('keyword').value.trim().toUpperCase();
            const errorMsg = document.getElementById('error-msg');

            if (databaseSchede[input]) {
                errorMsg.classList.add('hidden');
                const urlDestinazione = databaseSchede[input];
                
                if(urlDestinazione === "#") {
                    console.log("Signum valido: " + input);
                } else {
                    window.location.href = urlDestinazione; 
                }
            } else {
                errorMsg.classList.remove('hidden');
                const inputField = document.getElementById('keyword');
                inputField.classList.add('-translate-x-2');
                setTimeout(() => inputField.classList.remove('-translate-x-2', 'translate-x-2'), 300);
            }
        }
    </script>
</body>
</html>
