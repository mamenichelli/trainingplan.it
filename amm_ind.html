<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabularium | Gestione JSON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: #f3f4f6; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 3px; }
    </style>
</head>
<body class="relative min-h-screen pb-16">
    <header class="relative z-10 border-b border-gray-800 bg-gray-900/40 backdrop-blur-md py-6 px-4">
        <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex flex-col items-center sm:items-start text-center sm:text-left">
                <div class="text-[9px] text-amber-500/50 uppercase tracking-[0.4em] mb-1 font-cinzel">· TABVLARIVM ·</div>
                <h1 class="text-2xl font-black font-cinzel bg-gradient-to-r from-yellow-100 via-amber-400 to-amber-600 bg-clip-text text-transparent tracking-[0.2em] uppercase">DEVS ARCHIVIVM</h1>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-semibold text-amber-400 uppercase tracking-wider bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-lg">Format: JSON for Git</span>
            </div>
        </div>
    </header>

    <main class="relative z-10 max-w-4xl mx-auto px-4 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- FORM DI INSERIMENTO -->
        <section class="lg:col-span-1 space-y-6">
            <div class="bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800 shadow-xl">
                <h2 class="text-sm font-bold font-cinzel text-amber-400 uppercase tracking-wider mb-4">✦ Aggiungi Scheda</h2>
                <form id="add-form" onsubmit="salvaScheda(event)" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Nome Atleta</label>
                        <input type="text" id="form-nome" required placeholder="es. Asia e Mario" class="w-full bg-gray-950 border border-gray-800 text-white px-3 py-2 rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">Parola Chiave</label>
                        <input type="text" id="form-keyword" required placeholder="es. ASIAMARIO" class="w-full bg-gray-950 border border-gray-800 text-white px-3 py-2 rounded-xl text-sm font-bold uppercase tracking-wider">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-400 uppercase tracking-wider mb-1">File/Link HTML</label>
                        <input type="text" id="form-pagina" required placeholder="es. scheda_mario.html" class="w-full bg-gray-950 border border-gray-800 text-white px-3 py-2 rounded-xl text-sm">
                    </div>
                    <button type="submit" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl transition-all uppercase tracking-wider text-xs shadow-lg">Aggiorna Memoria</button>
                </form>
            </div>
        </section>

        <section class="lg:col-span-2 space-y-6">
            <div class="bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800 shadow-xl overflow-hidden">
                <h2 class="text-sm font-bold font-cinzel text-amber-400 uppercase tracking-wider mb-4">✦ Archivio Corrente</h2>
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-800 text-[10px] uppercase tracking-wider text-gray-400">
                                <th class="py-3 px-2">Nomen</th>
                                <th class="py-3 px-2">Signum</th>
                                <th class="py-3 px-2 text-right">Azione</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-xs divide-y divide-gray-800/50"></tbody>
                    </table>
                </div>
            </div>

            <!-- ESPORTAZIONE JSON -->
            <div class="bg-gray-900/60 backdrop-blur-md p-6 rounded-2xl border border-gray-800 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold font-cinzel text-amber-400 uppercase tracking-wider">✦ File database.json</h2>
                    <button onclick="copiaCodice()" class="bg-amber-600/20 hover:bg-amber-600 text-amber-400 hover:text-white px-3 py-1 rounded-lg text-[10px] font-bold uppercase transition-all">Copia JSON</button>
                </div>
                <pre id="code-output" class="bg-gray-950 p-4 rounded-xl border border-gray-800 text-[11px] font-mono text-amber-100 overflow-x-auto max-h-48"></pre>
                <p class="text-[10px] text-gray-500 mt-4 leading-relaxed italic">
                    Copia questo contenuto, crea un file chiamato <strong class="text-gray-300">database.json</strong> sul tuo repository Git e incollalo lì.
                </p>
            </div>
        </section>
    </main>

    <script>
        let database = JSON.parse(localStorage.getItem("devs_database")) || [
            { nome: "Asia e Mario", keyword: "ASIAMARIO", pagina: "amm_maggio26.html" },
            { nome: "Demo", keyword: "DEMO", pagina: "#" }
        ];

        function salvaSuLocalStorage() { localStorage.setItem("devs_database", JSON.stringify(database)); }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = database.map((entry, index) => `
                <tr class="border-b border-gray-800/30">
                    <td class="py-4 px-2">${entry.nome}</td>
                    <td class="py-4 px-2 text-amber-400 font-bold">${entry.keyword}</td>
                    <td class="py-4 px-2 text-right">
                        <button onclick="elimina(${index})" class="text-red-500 hover:text-red-400 font-bold uppercase text-[9px]">Cancella</button>
                    </td>
                </tr>`).join('');
            renderJSON();
        }

        function renderJSON() {
            const jsonOutput = {};
            database.forEach(e => jsonOutput[e.keyword] = e.pagina);
            document.getElementById('code-output').innerText = JSON.stringify(jsonOutput, null, 4);
        }

        function salvaScheda(e) {
            e.preventDefault();
            const keyword = document.getElementById('form-keyword').value.trim().toUpperCase();
            const nome = document.getElementById('form-nome').value.trim();
            const pagina = document.getElementById('form-pagina').value.trim();
            
            const idx = database.findIndex(d => d.keyword === keyword);
            if (idx !== -1) database[idx] = { nome, keyword, pagina };
            else database.push({ nome, keyword, pagina });

            salvaSuLocalStorage();
            renderTable();
            document.getElementById('add-form').reset();
        }

        function elimina(index) {
            database.splice(index, 1);
            salvaSuLocalStorage();
            renderTable();
        }

        function copiaCodice() {
            const text = document.getElementById('code-output').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("JSON copiato!");
        }

        document.addEventListener("DOMContentLoaded", renderTable);
    </script>
</body>
</html>
